<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitab Jurmiyah - Full Screen Fix</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            width: 100vw;
            height: 100vh;
        }
        
        #viewport {
            width: 100%;
            height: 100%;
        }

        #flipbook {
            width: 100vw !important;
            height: 100vh !important;
        }

        .page {
            background-color: white;
            width: 100vw !important;
            height: 100vh !important;
        }

        /* Memaksa gambar menutupi seluruh layar HP */
        .page img {
            width: 100vw;
            height: 100vh;
            display: block;
            object-fit: fill; /* Gambar ditarik full ke pojok layar */
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flipbook">
            <div class="page"><img src="halaman1.jpg"></div>
            <div class="page"><img src="halaman2.jpg"></div>
            <div class="page"><img src="halaman3.jpg"></div>
            <div class="page"><img src="halaman4.jpg"></div>
            <div class="page"><img src="halaman5.jpg"></div>
        </div>
    </div>

    <script type="text/javascript">
        $(window).ready(function() {
            var fb = $("#flipbook");

            fb.turn({
                width: $(window).width(),
                height: $(window).height(),
                display: 'single', 
                acceleration: true,
                gradients: true,
                elevation: 100,
                // Kita matikan arah default biar gak bentrok sama swipe manual
                autoCenter: true
            });

            // LOGIKA USAP: KIRI KE KANAN (--->) UNTUK HALAMAN SELANJUTNYA
            var startX;
            $(document).on("touchstart", function(e) {
                startX = e.originalEvent.touches[0].pageX;
            });

            $(document).on("touchend", function(e) {
                var endX = e.originalEvent.changedTouches[0].pageX;
                var distance = startX - endX;

                // Jika jari ditarik ke KANAN (Kiri ke Kanan)
                if (distance < -50) { 
                    fb.turn("next"); 
                } 
                // Jika jari ditarik ke KIRI
                else if (distance > 50) {
                    fb.turn("previous");
                }
            });
        });

        $(window).resize(function() {
            $("#flipbook").turn("size", $(window).width(), $(window).height());
        });
    </script>
</body>
</html>
