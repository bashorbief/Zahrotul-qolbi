<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab Al-Jurmiyah</title>
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/themify-icons.min.css" rel="stylesheet">
</head>
<body style="margin:0; background-color:#2c3e50;">

    <div id="container-kitab" style="height:100vh;"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.45/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            // Kita pakai link lengkap supaya tidak bingung
            var filePDF = "https://bashorbief.github.io/Zahrotul-qolbi/al-jurmiyah.pdf";

            var opsi = {
                direction: 2, // Dari KANAN ke kiri
                duration: 800,
                webgl: false // Pakai 2D supaya lancar di HP
            };

            // Menjalankan Flipbook
            $("#container-kitab").flipBook(filePDF, opsi);
        });
    </script>

</body>
</html>
