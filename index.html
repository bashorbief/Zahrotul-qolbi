<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab Al-Jurmiyah Flipbook</title>
    <style>
        body { background-color: #2c3e50; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .book-container { width: 95%; height: 90%; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        .overlay-right { position: absolute; top: 0; right: 0; width: 40px; height: 100%; background: linear-gradient(to left, rgba(0,0,0,0.2), transparent); pointer-events: none; }
        .nav-info { position: fixed; bottom: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="book-container">
        <iframe src="https://docs.google.com/viewer?url=https://bashorbief.github.io/Zahrotul-qolbi/al-jurmiyah.pdf&embedded=true"></iframe>
        <div class="overlay-right"></div>
    </div>

    <div class="nav-info">Gunakan scroll/panah untuk membalik halaman Kitab</div>

</body>
</html>
