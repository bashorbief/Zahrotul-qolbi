<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Buku Digital Fullscreen</title>

<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Turn.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* Container Fullscreen */
#book-container{
    width:100vw;
    height:100vh;
    position:relative;
}

/* Buku */
#mybook{
    width:100%;
    height:100%;
}

/* Halaman */
.page{
    width:100%;
    height:100%;
    background:#fff;
}

/* Gambar halaman */
.page img{
    width:100%;
    height:100%;
    object-fit:fill;
    display:block;
}

</style>
</head>
<body>

<div id="book-container">

    <div id="mybook">

        <div class="page">
            <img src="halaman1.jpg" alt="1">
        </div>

        <div class="page">
            <img src="halaman2.jpg" alt="2">
        </div>

        <div class="page">
            <img src="halaman3.jpg" alt="3">
        </div>

        <div class="page">
            <img src="halaman4.jpg" alt="4">
        </div>

        <div class="page">
            <img src="halaman5.jpg" alt="5">
        </div>

    </div>

</div>

<script>

$(document).ready(function(){

    $("#mybook").turn({

        /* Fullscreen seperti kode pertama */
        width:$(window).width(),
        height:$(window).height(),

        /* Animasi halus seperti kode kedua */
        autoCenter:true,
        display:'single',
        acceleration:true,
        gradients:true,

        /* Sedang agar smooth */
        elevation:50,

        when:{

            turning:function(event,page,view){

                console.log("Membuka halaman : "+page);

            }

        }

    });

});

/* Responsive saat HP diputar */
$(window).resize(function(){

    $("#mybook").turn(
        "size",
        $(window).width(),
        $(window).height()
    );

});

</script>

</body>
</html>
