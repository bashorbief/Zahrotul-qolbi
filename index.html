<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Kitab Al-Jurmiyah</title>

    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50; /* Warna latar biru gelap */
        }
        #container-kitab {
            height: 100vh; /* Memenuhi layar HP */
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="container-kitab"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.45/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            // Nama file PDF harus sama persis dengan yang di upload
            var filePDF = "al-jurmiyah.pdf"; 

            var opsi = {
                direction: 2,      // Memulai dari KANAN (RTL)
                duration: 800,     // Kecepatan membalik halaman
                height: "100%",    // Tinggi maksimal
                backgroundColor: "#2c3e50"
            };

            // Menjalankan flipbook
            $("#container-kitab").flipBook(filePDF, opsi);
        });
    </script>

</body>
</html>
