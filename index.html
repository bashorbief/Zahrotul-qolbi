<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitab Gaya Iqro Asli</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <style>
        body { background-color: #000; margin: 0; padding: 0; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; display: flex; justify-content: center; }
        #flipbook { width: 100vw !important; height: 100vh !important; }
        .page { width: 100vw !important; height: 100vh !important; background-color: white; }
        .page img { width: 100%; height: 100%; object-fit: fill; }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flipbook">
            <div class="page"><img src="halaman1.jpg"></div>
            <div class="page"><img src="halaman2.jpg"></div>
            <div class="page"><img src="halaman3.jpg"></div>
            <div class="page"><img src="halaman4.jpg"></div>
            <div class="page"><img src="halaman5.jpg"></div>
        </div>
    </div>

    <script type="text/javascript">
        $(window).ready(function() {
            var fb = $("#flipbook");

            fb.turn({
                display: 'single',
                // Kita pakai LTR tapi kita balik logikanya agar lipatan dari kiri
                direction: 'ltr', 
                acceleration: true,
                gradients: true,
                elevation: 250,    
                duration: 1000,
                // KUNCINYA DI SINI: Memaksa pojok kiri yang aktif
                corners: 'backward' 
            });

            var startX;
            $(document).on("touchstart", function(e) {
                startX = e.originalEvent.touches[0].pageX;
            });

            $(document).on("touchend", function(e) {
                var endX = e.originalEvent.changedTouches[0].pageX;
                var dist = startX - endX;

                // Gaya Iqro: Usap ke Kanan (--->) untuk MAJU
                // Karena kita pakai trik LTR, maka 'previous' akan mengangkat pojok kiri
                if (dist < -50) { 
                    fb.turn("next"); 
                } 
                // Usap ke Kiri (<---) untuk MUNDUR
                else if (dist > 50) {
                    fb.turn("previous");
                }
            });
        });
    </script>
</body>
</html>
