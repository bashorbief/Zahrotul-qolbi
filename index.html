<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlipBook PDF</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:sans-serif;
}

.book{
position:relative;
width:320px;
height:500px;
perspective:2500px;
}

.page{
position:absolute;
width:100%;
height:100%;
transform-origin:right;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
}

.page.flipped{
transform:rotateY(-180deg);
}

.front,
.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
overflow:hidden;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
background:white;
}

.back{
transform:rotateY(180deg);
}

img{
width:100%;
height:100%;
object-fit:cover;
}

.page:nth-child(1){z-index:5;}
.page:nth-child(2){z-index:4;}
.page:nth-child(3){z-index:3;}
.page:nth-child(4){z-index:2;}
.page:nth-child(5){z-index:1;}

.info{
position:fixed;
bottom:20px;
color:white;
font-size:14px;
}

</style>
</head>

<body>

<div class="book">

<div class="page">
<div class="front">
<img src="halaman1.jpg">
</div>
<div class="back">
<img src="halaman2.jpg">
</div>
</div>

<div class="page">
<div class="front">
<img src="halaman3.jpg">
</div>
<div class="back">
<img src="halaman4.jpg">
</div>
</div>

<div class="page">
<div class="front">
<img src="halaman5.jpg">
</div>
<div class="back">
<img src="halaman1.jpg">
</div>
</div>

</div>

<div class="info">
Tap halaman untuk membuka
</div>

<script>

const pages=document.querySelectorAll(".page");

pages.forEach((page,index)=>{

page.addEventListener("click",()=>{

page.classList.toggle("flipped");

});

});

</script>

</body>
</html>
