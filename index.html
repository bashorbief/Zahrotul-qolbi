<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Buku Digital</title>

<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- TurnJS BENAR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#book-container{
    width:100vw;
    height:100vh;
}

#mybook{
    width:100%;
    height:100%;
}

.page{
    width:100%;
    height:100%;
    background:white;
}

.page img{
    width:100%;
    height:100%;
    object-fit:fill;
    display:block;
}

</style>
</head>
<body>

<div id="book-container">

    <div id="mybook">

        <div class="page">
            <img src="halaman1.jpg">
        </div>

        <div class="page">
            <img src="halaman2.jpg">
        </div>

        <div class="page">
            <img src="halaman3.jpg">
        </div>

        <div class="page">
            <img src="halaman4.jpg">
        </div>

        <div class="page">
            <img src="halaman5.jpg">
        </div>

    </div>

</div>

<script>

$(document).ready(function(){

    $("#mybook").turn({

        width:$(window).width(),
        height:$(window).height(),

        display:'single',

        autoCenter:true,

        acceleration:true,

        gradients:true,

        elevation:50

    });

});

/* Resize */
$(window).resize(function(){

    $("#mybook").turn(
        "size",
        $(window).width(),
        $(window).height()
    );

});

</script>

</body>
</html>
