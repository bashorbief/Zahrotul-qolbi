<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Kitab</title>
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/themify-icons.min.css" rel="stylesheet">
</head>
<body style="margin:0; background-color:#2c3e50;">

    <div id="pembungkus-buku" style="height:100vh;"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.45/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            var filePDF = "al-jurmiyah.pdf";
            var pengaturan = {
                direction: 2,       // Mulai dari KANAN
                duration: 800,      // Animasi lipat halaman
                webgl: false,       // Pakai mode 2D supaya ringan di HP
                hard: "none",       // Biar kertasnya lentur
                backgroundColor: "#2c3e50"
            };
            
            // Menjalankan Flipbook
            $("#pembungkus-buku").flipBook(filePDF, pengaturan);
        });
    </script>

</body>
</html>
