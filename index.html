<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.book{
position:relative;
width:320px;
height:500px;
perspective:2000px;
}

.page{
position:absolute;
width:100%;
height:100%;
transform-origin:right;
transform-style:preserve-3d;
transition:1s;
}

.page.flipped{
transform:rotateY(-180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
overflow:hidden;
border-radius:10px;
background:white;
}

.back{
transform:rotateY(180deg);
}

img{
width:100%;
height:100%;
object-fit:cover;
}

.page:nth-child(1){z-index:3;}
.page:nth-child(2){z-index:2;}
.page:nth-child(3){z-index:1;}

</style>
</head>

<body>

<div class="book">

<div class="page">
<div class="front">
<img src="halaman1.jpg">
</div>
<div class="back">
<img src="halaman2.jpg">
</div>
</div>

<div class="page">
<div class="front">
<img src="halaman3.jpg">
</div>
<div class="back">
<img src="halaman4.jpg">
</div>
</div>

<div class="page">
<div class="front">
<img src="halaman5.jpg">
</div>
<div class="back" style="background:#ddd;">
</div>
</div>

</div>

<script>

const pages=document.querySelectorAll(".page");

pages.forEach((page)=>{

page.addEventListener("click",()=>{

page.classList.toggle("flipped");

});

});

</script>

</body>
</html>
