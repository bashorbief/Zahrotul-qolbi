<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flipbook Kitab Jurmiyah</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <style>
        body { 
            background-color: #1a1a1a; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        
        /* Area tempat buku berada */
        #viewport {
            width: 90vw;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ukuran Buku */
        #flipbook {
            width: 100%;
            height: 100%;
        }

        /* Gaya setiap halaman */
        .page {
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Agar gambar tidak gepeng */
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flipbook">
            <div class="page"><img src="halaman1.jpg"></div>
            <div class="page"><img src="halaman2.jpg"></div>
            <div class="page"><img src="halaman3.jpg"></div>
            <div class="page"><img src="halaman4.jpg"></div>
            <div class="page"><img src="halaman5.jpg"></div>
        </div>
    </div>

    <script type="text/javascript">
        $(window).ready(function() {
            var fb = $("#flipbook");

            // Menjalankan animasi flip
            fb.turn({
                width: fb.width(),
                height: fb.height(),
                autoCenter: true,
                direction: 'rtl',    // Membuka dari kanan (Kitab)
                acceleration: true,   // Biar ringan di HP
                gradients: true,      // Efek bayangan saat kertas ditekuk
                elevation: 50
            });
        });

        // Supaya ukuran tetap pas kalau layar HP diputar/resize
        $(window).resize(function() {
            $("#flipbook").turn("size", $("#viewport").width(), $("#viewport").height());
        });
    </script>

</body>
</html>
