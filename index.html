<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Kitab Al-Jurmiyah</title>
    
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.90/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.90/css/themify-icons.min.css" rel="stylesheet">
</head>
<body style="margin:0; background-color:#1a1a1a;">

    <div id="df_book_custom" style="height:100vh;"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.90/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            // Gunakan path lengkap agar GitHub tidak bingung
            var pdfUrl = "https://bashorbief.github.io/Zahrotul-qolbi/al-jurmiyah.pdf";

            var options = {
                direction: 2,           // Mulai dari kanan (RTL)
                duration: 700,
                webgl: false,           // Matikan 3D agar tidak berat & tidak gampang blank
                scrollWheel: false,
                backgroundColor: "#1a1a1a",
                forceDownload: false
            };

            // Menjalankan Flipbook
            var flipBook = $("#df_book_custom").flipBook(pdfUrl, options);
        });
    </script>

</body>
</html>
