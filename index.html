<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Digital</title>
    
    <!-- Library CSS untuk transisi halus -->
    <link rel="stylesheet" href="https://unpkg.com/pageable@latest/dist/pageable.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Setiap halaman memenuhi layar */
        .page {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: fill; /* Gambar paksa penuh layar sesuai permintaan */
        }

        /* Menghilangkan navigasi bawaan agar bersih */
        .pg-pips {
            display: none;
        }
    </style>
</head>
<body>

<div id="container">
    <section class="page" data-anchor="p1">
        <img src="halaman1.jpg">
    </section>
    <section class="page" data-anchor="p2">
        <img src="halaman2.jpg">
    </section>
    <section class="page" data-anchor="p3">
        <img src="halaman3.jpg">
    </section>
    <section class="page" data-anchor="p4">
        <img src="halaman4.jpg">
    </section>
    <section class="page" data-anchor="p5">
        <img src="halaman5.jpg">
    </section>
</div>

<!-- Library JS Pageable -->
<script src="https://unpkg.com/pageable@latest/dist/pageable.min.js"></script>

<script>
    new Pageable("#container", {
        childSelector: ".page", // Menentukan elemen mana yang jadi halaman
        orientation: "horizontal", // Geser ke samping (seperti buku)
        pips: false, // Menghilangkan titik navigasi
        animation: 600, // Kecepatan pindah halaman (ms)
        swipeThreshold: 50, // Sensitivitas geseran jari
        freeScroll: false, // Berhenti tepat di setiap halaman
        onInit: function() {
            // Memastikan container benar-benar penuh
            document.querySelector('#container').style.height = "100vh";
        }
    });
</script>

</body>
</html>
