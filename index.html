<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Kitab</title>
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/themify-icons.min.css" rel="stylesheet" type="text/css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #2c3e50; }
        #container-kitab { height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div id="container-kitab"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.45/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            // Kita coba panggil nama file yang ada di repo kamu
            var filePDF = "al-jurmiyah.pdf"; 

            var opsi = {
                direction: 2, 
                duration: 800,
                webgl: false, // Matikan WebGL jika di HP agar lebih ringan
                allControls: "alt,next,prev,zoom,outline,share"
            };

            $("#container-kitab").flipBook(filePDF, opsi);
        });
    </script>

</body>
</html>
