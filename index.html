<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Animasi Saya</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            overflow: hidden;
        }

        #book-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #my-book {
            width: 100%;
            height: 100%;
        }

        .page {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>

<div id="book-container">
    <div id="my-book">
        <!-- Halaman 1-5 -->
        <div class="page" style="background-image: url('halaman1.jpg');"></div>
        <div class="page" style="background-image: url('halaman2.jpg');"></div>
        <div class="page" style="background-image: url('halaman3.jpg');"></div>
        <div class="page" style="background-image: url('halaman4.jpg');"></div>
        <div class="page" style="background-image: url('halaman5.jpg');"></div>
    </div>
</div>

<script>
    $(document).ready(function() {
        // Inisialisasi Turn.js
        $('#my-book').turn({
            width: $(window).width(),
            height: $(window).height(),
            autoCenter: true,
            display: 'single', // Menampilkan satu halaman saja agar pas di mobile
            acceleration: true,
            gradients: true,
            elevation: 50,
            when: {
                turning: function(event, page, view) {
                    // Animasi perpindahan
                }
            }
        });

        // Responsif saat layar diputar/resize
        $(window).resize(function() {
            $('#my-book').turn('size', $(window).width(), $(window).height());
        });
    });
</script>

</body>
</html>
