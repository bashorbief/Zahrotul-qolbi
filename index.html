<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Digital Fullscreen</title>
    
    <!-- Library JQuery dan Turn.js -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/script/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        /* Menghilangkan scrollbar dan margin agar benar-benar full */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Background hitam agar fokus ke gambar */
        }

        /* Container utama memenuhi layar */
        #book-container {
            width: 100vw;
            height: 100vh;
        }

        #mybook {
            width: 100%;
            height: 100%;
        }

        /* Styling per halaman agar 1 layer full */
        .page {
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Gambar akan memenuhi layar, sedikit terpotong jika rasio beda tapi tidak ada celah kosong */
            display: block;
        }

        /* Menghilangkan efek bayangan default di tengah agar terlihat seperti 1 layer */
        .shadow {
            -webkit-box-shadow: none !important;
            -moz-box-shadow: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

<div id="book-container">
    <div id="mybook">
        <div class="page"><img src="halaman1.jpg"></div>
        <div class="page"><img src="halaman2.jpg"></div>
        <div class="page"><img src="halaman3.jpg"></div>
        <div class="page"><img src="halaman4.jpg"></div>
        <div class="page"><img src="halaman5.jpg"></div>
    </div>
</div>

<script type="text/javascript">
    $(document).ready(function() {
        var book = $("#mybook");

        book.turn({
            width: $(window).width(),
            height: $(window).height(),
            autoCenter: true,
            display: 'single', // Memastikan hanya 1 halaman (1 layer) yang tampil
            acceleration: true,
            gradients: true,
            elevation: 100, // Membuat lengkungan saat geser lebih terasa
            duration: 1000, // Kecepatan animasi lipatan
            
            // Pengaturan agar bisa digeser di mana saja (Full Area Touch)
            when: {
                turning: function(event, page, view) {
                    // Logika tambahan jika ingin aksi saat ganti halaman
                }
            }
        });

        // Memungkinkan geser di area mana saja di layar
        $(window).bind('keydown', function(e) {
            if (e.keyCode == 37) book.turn('previous');
            else if (e.keyCode == 39) book.turn('next');
        });
    });

    // Update ukuran otomatis jika orientasi layar berubah (Portrait/Landscape)
    $(window).resize(function() {
        $("#mybook").turn("size", $(window).width(), $(window).height());
    });
</script>

</body>
</html>
