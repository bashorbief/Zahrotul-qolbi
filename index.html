<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitab Jurmiyah - Single Page</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <style>
        body { 
            background-color: #000; /* Hitam agar fokus ke kitab */
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        
        #viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #flipbook {
            width: 100%;
            height: 100%;
        }

        .page {
            background-color: #fff;
            width: 100%;
            height: 100%;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Gambar penuh tanpa terpotong */
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flipbook">
            <div class="page"><img src="halaman1.jpg"></div>
            <div class="page"><img src="halaman2.jpg"></div>
            <div class="page"><img src="halaman3.jpg"></div>
            <div class="page"><img src="halaman4.jpg"></div>
            <div class="page"><img src="halaman5.jpg"></div>
        </div>
    </div>

    <script type="text/javascript">
        $(window).ready(function() {
            var fb = $("#flipbook");

            fb.turn({
                width: $(window).width(),
                height: $(window).height(),
                autoCenter: true,
                display: 'single', // PAKSA SATU HALAMAN
                direction: 'rtl',   // Tetap dari kanan ke kiri
                acceleration: true,
                gradients: true,
                elevation: 0        // Menghilangkan bayangan tekukan agar fokus ke gambar full
            });

            // Mendukung swipe/geser di mana saja pada layar
            $(document).on("touchstart", function(e) {
                var startX = e.originalEvent.touches[0].pageX;
                $(document).one("touchend", function(e) {
                    var endX = e.originalEvent.changedTouches[0].pageX;
                    if (startX - endX > 50) {
                        fb.turn("next"); // Geser ke kiri
                    } else if (endX - startX > 50) {
                        fb.turn("previous"); // Geser ke kanan
                    }
                });
            });
        });

        // Update ukuran jika layar berubah (misal rotasi)
        $(window).resize(function() {
            var w = $(window).width();
            var h = $(window).height();
            $("#flipbook").turn("size", w, h);
        });
    </script>

</body>
</html>
