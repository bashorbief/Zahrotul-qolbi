<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Saya</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* Mencegah scroll atas bawah */
        }

        /* Container utama untuk geser horizontal */
        .book-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory; /* Ini yang bikin gambar 'nempel' pas digeser */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Supaya smooth di iPhone */
        }

        /* Sembunyikan scrollbar agar bersih */
        .book-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* Tiap halaman buku */
        .page {
            min-width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Gambar utuh, tidak terpotong */
            pointer-events: none; /* Mencegah gambar 'terangkat' saat ditekan lama */
        }
    </style>
</head>
<body>

    <div class="book-wrapper">
        <div class="page"><img src="halaman1.jpg"></div>
        <div class="page"><img src="halaman2.jpg"></div>
        <div class="page"><img src="halaman3.jpg"></div>
        <div class="page"><img src="halaman4.jpg"></div>
        <div class="page"><img src="halaman5.jpg"></div>
    </div>

</body>
</html>
