<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Digital Mobile</title>
    <!-- CSS Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        html, body {
            position: relative;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
        }

        .swiper {
            width: 100%;
            height: 100%;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Agar gambar tidak terpotong, ganti ke 'cover' jika ingin full tanpa sisa hitam */
        }
    </style>
</head>
<body>

    <!-- Slider main container -->
    <div class="swiper">
        <div class="swiper-wrapper">
            <!-- Halaman 1-5 -->
            <div class="swiper-slide"><img src="halaman1.jpg"></div>
            <div class="swiper-slide"><img src="halaman2.jpg"></div>
            <div class="swiper-slide"><img src="halaman3.jpg"></div>
            <div class="swiper-slide"><img src="halaman4.jpg"></div>
            <div class="swiper-slide"><img src="halaman5.jpg"></div>
        </div>
        <!-- Tambahan navigasi jika ingin titik-titik di bawah -->
        <div class="swiper-pagination"></div>
    </div>

    <!-- JS Swiper -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const swiper = new Swiper('.swiper', {
            // Efek lipatan/geser kreatif
            effect: 'creative',
            creativeEffect: {
                prev: {
                    shadow: true,
                    translate: [0, 0, -400],
                },
                next: {
                    translate: ['100%', 0, 0],
                },
            },
            // Atau ganti ke effect: 'flip' jika ingin benar-benar seperti membalik kartu
            
            grabCursor: true,
            loop: false,
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        });
    </script>
</body>
</html>
