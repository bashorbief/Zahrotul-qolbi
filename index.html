<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab Al-Jurmiyah</title>
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.86/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.86/css/themify-icons.min.css" rel="stylesheet">
</head>
<body style="margin:0; background-color:#2c3e50;">

    <div id="flipbook-display" style="height:100vh;"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.86/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            // Memastikan link PDF kamu benar-benar terpanggil
            var filePDF = "al-jurmiyah.pdf"; 

            var options = {
                direction: 2,           // Buka dari KANAN ke KIRI (RTL)
                duration: 800,          // Kecepatan animasi
                webgl: false,           // Sangat penting agar HP tidak blank
                height: "100%",
                backgroundColor: "#2c3e50"
            };

            // Jalankan fungsi pembuat buku
            $("#flipbook-display").flipBook(filePDF, options);
        });
    </script>

</body>
</html>
