<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitab Jurmiyah - Custom Direction</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <style>
        body { background-color: #000; margin: 0; padding: 0; overflow: hidden; }
        
        #viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Trik Satu Halaman Full */
        #flipbook {
            width: 200vw !important; 
            height: 100vh !important;
        }

        .page {
            background-color: white;
            width: 100vw !important;
            height: 100vh !important;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flipbook">
            <div class="page"><img src="halaman1.jpg"></div>
            <div class="page"><img src="halaman2.jpg"></div>
            <div class="page"><img src="halaman3.jpg"></div>
            <div class="page"><img src="halaman4.jpg"></div>
            <div class="page"><img src="halaman5.jpg"></div>
        </div>
    </div>

    <script type="text/javascript">
        $(window).ready(function() {
            var fb = $("#flipbook");

            fb.turn({
                acceleration: true,
                gradients: true,
                elevation: 200,
                duration: 1000,
                direction: 'ltr', // DIUBAH KE LTR (Kiri ke Kanan)
                display: 'double'
            });

            // LOGIKA USAP SESUAI PERMINTAAN: KIRI KE KANAN --->
            var startX;
            $(document).on("touchstart", function(e) {
                startX = e.originalEvent.touches[0].pageX;
            });

            $(document).on("touchend", function(e) {
                var endX = e.originalEvent.changedTouches[0].pageX;
                var distance = startX - endX;

                if (Math.abs(distance) > 50) { 
                    // JIKA USAP KE KANAN (distance negatif), MAKA NEXT
                    if (distance < 0) {
                        fb.turn("next"); 
                    } 
                    // JIKA USAP KE KIRI, MAKA PREVIOUS
                    else {
                        fb.turn("previous");
                    }
                }
            });
        });
    </script>
</body>
</html>
