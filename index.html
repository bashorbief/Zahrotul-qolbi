<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Flipbox 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Kartu 1 -->
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <!-- Menggunakan huruf kecil sesuai permintaanmu -->
                    <img src="halaman1.jpg" alt="Halaman 1">
                </div>
                <div class="flip-card-back">
                    <h3>Halaman 1</h3>
                    <p>Informasi detail untuk konten halaman pertama.</p>
                    <button class="btn">Lihat Detail</button>
                </div>
            </div>
        </div>

        <!-- Kartu 2 -->
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="halaman2.jpg" alt="Halaman 2">
                </div>
                <div class="flip-card-back">
                    <h3>Halaman 2</h3>
                    <p>Informasi detail untuk konten halaman kedua.</p>
                    <button class="btn">Lihat Detail</button>
                </div>
            </div>
        </div>

        <!-- Kartu 3 -->
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="halaman3.jpg" alt="Halaman 3">
                </div>
                <div class="flip-card-back">
                    <h3>Halaman 3</h3>
                    <p>Informasi detail untuk konten halaman ketiga.</p>
                    <button class="btn">Lihat Detail</button>
                </div>
            </div>
        </div>

        <!-- Kartu 4 -->
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="halaman4.jpg" alt="Halaman 4">
                </div>
                <div class="flip-card-back">
                    <h3>Halaman 4</h3>
                    <p>Informasi detail untuk konten halaman keempat.</p>
                    <button class="btn">Lihat Detail</button>
                </div>
            </div>
        </div>

        <!-- Kartu 5 -->
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="halaman5.jpg" alt="Halaman 5">
                </div>
                <div class="flip-card-back">
                    <h3>Halaman 5</h3>
                    <p>Informasi detail untuk konten halaman kelima.</p>
                    <button class="btn">Lihat Detail</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
