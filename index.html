<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku 3D Interaktif</title>
    <style>
        :root {
            --book-width: 300px;
            --book-height: 400px;
            --speed: 0.8s;
        }
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            perspective: 2000px;
        }
        .book {
            width: var(--book-width);
            height: var(--book-height);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }
        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform var(--speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0 10px 10px 0;
            box-shadow: inset -1px 0 2px rgba(0,0,0,0.3);
        }
        .front {
            z-index: 2;
            background: #fff;
        }
        .back {
            transform: rotateY(180deg);
            background: #e0e0e0;
            z-index: 1;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0 10px 10px 0;
        }
        /* Efek bayangan saat halaman terbuka */
        .page.flipped {
            transform: rotateY(-180deg);
        }
        /* Mengatur tumpukan */
        .p1 { z-index: 5; }
        .p2 { z-index: 4; }
        .p3 { z-index: 3; }
        .p4 { z-index: 2; }
        .p5 { z-index: 1; }
    </style>
</head>
<body>

    <div class="book" id="book">
        <!-- Halaman 1 -->
        <div class="page p1" id="page1">
            <div class="front"><img src="halaman1.jpg"></div>
            <div class="back"><img src="halaman2.jpg"></div>
        </div>
        <!-- Halaman 2 -->
        <div class="page p2" id="page2">
            <div class="front"><img src="halaman3.jpg"></div>
            <div class="back"><img src="halaman4.jpg"></div>
        </div>
        <!-- Halaman 3 (Contoh) -->
        <div class="page p3" id="page3">
            <div class="front"><img src="halaman5.jpg"></div>
            <div class="back" style="background:#fff;"><h3>Selesai</h3></div>
        </div>
    </div>

    <script>
        let currentLoc = 1;
        let nPages = 3;
        let maxLoc = nPages + 1;

        const pages = document.querySelectorAll('.page');
        const book = document.querySelector('#book');

        // Deteksi Swipe Sederhana
        let touchstartX = 0;
        let touchendX = 0;

        window.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        window.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleGesture();
        });

        function handleGesture() {
            if (touchendX < touchstartX - 50) goNextPage();
            if (touchendX > touchstartX + 50) goPrevPage();
        }

        // Navigasi Klik
        pages.forEach((page, index) => {
            page.onclick = () => {
                if (currentLoc === index + 1) {
                    goNextPage();
                } else if (currentLoc === index + 2) {
                    goPrevPage();
                }
            }
        });

        function goNextPage() {
            if (currentLoc < maxLoc) {
                const page = document.querySelector(`#page${currentLoc}`);
                page.classList.add("flipped");
                page.style.zIndex = currentLoc;
                currentLoc++;
            }
        }

        function goPrevPage() {
            if (currentLoc > 1) {
                currentLoc--;
                const page = document.querySelector(`#page${currentLoc}`);
                page.classList.remove("flipped");
                // Kembalikan z-index tumpukan
                page.style.zIndex = nPages - currentLoc + 5;
            }
        }
    </script>
</body>
</html>
