<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Digital Full</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/script/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        #mybook {
            width: 100vw;
            height: 100vh;
        }

        .page {
            width: 100%; height: 100%;
            background-color: #000;
        }

        .page img {
            width: 100%; height: 100%;
            object-fit: fill; /* Gambar paksa penuh layar */
            pointer-events: none; /* Agar gambar tidak mengganggu sentuhan */
        }
    </style>
</head>
<body>

<div id="mybook">
    <div class="page"><img src="halaman1.jpg"></div>
    <div class="page"><img src="halaman2.jpg"></div>
    <div class="page"><img src="halaman3.jpg"></div>
    <div class="page"><img src="halaman4.jpg"></div>
    <div class="page"><img src="halaman5.jpg"></div>
</div>

<script type="text/javascript">
    $(document).ready(function() {
        var book = $("#mybook");

        // Inisialisasi Turn.js
        book.turn({
            width: $(window).width(),
            height: $(window).height(),
            display: 'single',
            acceleration: true,
            gradients: true,
            elevation: 50
        });

        // LOGIKA GESER DI MANA SAJA (Touch Swipe)
        var startX;
        
        document.getElementById('mybook').addEventListener('touchstart', function(e) {
            startX = e.touches[0].clientX;
        }, false);

        document.getElementById('mybook').addEventListener('touchend', function(e) {
            var endX = e.changedTouches[0].clientX;
            var threshold = 50; // Jarak minimal geser agar pindah (pixel)

            if (startX - endX > threshold) {
                book.turn('next'); // Geser ke kiri -> Halaman selanjutnya
            } else if (endX - startX > threshold) {
                book.turn('previous'); // Geser ke kanan -> Halaman sebelumnya
            }
        }, false);
    });

    // Perbaiki ukuran jika layar berputar
    $(window).resize(function() {
        $("#mybook").turn("size", $(window).width(), $(window).height());
    });
</script>

</body>
</html>
