<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Kitab Al-Jurmiyah</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.min.js"></script>
    <style>
        body { background-color: #2c3e50; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #canvas-container { width: 90%; height: 80%; position: relative; }
        canvas { background-color: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 100%; height: auto; }
        .controls { position: fixed; bottom: 20px; color: white; font-family: sans-serif; display: flex; gap: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #e74c3c; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <div class="controls">
        <button onclick="prevPage()">Kembali</button>
        <span id="page-info">Halaman <span id="page-num"></span> / <span id="page-count"></span></span>
        <button onclick="nextPage()">Lanjut</button>
    </div>

    <script>
        var url = 'al-jurmiyah.pdf'; // Pastikan nama file sesuai
        var pdfDoc = null, pageNum = 1, pageRendering = false, pageNumPending = null, scale = 1.5, canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');

        pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        });

        function renderPage(num) {
            pageRendering = true;
            pdfDoc.getPage(num).then(function(page) {
                var viewport = page.getViewport({scale: scale});
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                var renderContext = { canvasContext: ctx, viewport: viewport };
                var renderTask = page.render(renderContext);
                renderTask.promise.then(function() {
                    pageRendering = false;
                    if (pageNumPending !== null) { renderPage(pageNumPending); pageNumPending = null; }
                });
            });
            document.getElementById('page-num').textContent = num;
        }

        function queueRenderPage(num) { if (pageRendering) { pageNumPending = num; } else { renderPage(num); } }
        function prevPage() { if (pageNum <= 1) return; pageNum--; queueRenderPage(pageNum); }
        function nextPage() { if (pageNum >= pdfDoc.numPages) return; pageNum++; queueRenderPage(pageNum); }
    </script>
</body>
</html>
