<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Flip Book</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#mybook{
    width:100vw;
    height:100vh;
}

.page{
    width:100%;
    height:100%;
}

.page img{
    width:100%;
    height:100%;
    object-fit:fill;
    display:block;

    /* penting untuk swipe HP */
    pointer-events:none;
}

</style>
</head>
<body>

<div id="mybook">

    <div class="page">
        <img src="halaman1.jpg">
    </div>

    <div class="page">
        <img src="halaman2.jpg">
    </div>

    <div class="page">
        <img src="halaman3.jpg">
    </div>

    <div class="page">
        <img src="halaman4.jpg">
    </div>

    <div class="page">
        <img src="halaman5.jpg">
    </div>

</div>

<script>

/* tunggu SEMUA gambar selesai */
window.onload = function(){

    $('#mybook').turn({

        width:window.innerWidth,

        height:window.innerHeight,

        display:'single',

        autoCenter:true,

        gradients:true,

        acceleration:true,

        elevation:50,

        duration:800

    });

};

/* resize */
window.addEventListener('resize',function(){

    $('#mybook').turn(
        'size',
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
