<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab Al-Jurmiyah</title>
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.90/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.90/css/themify-icons.min.css" rel="stylesheet">
</head>
<body style="margin:0; background-color:#2c3e50;">

    <div id="pembungkus-buku" style="height:100vh;"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.90/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            // Memanggil file PDF kamu langsung di folder utama
            var filePDF = "al-jurmiyah.pdf"; 

            var pengaturan = {
                direction: 2,       // Animasi buka dari KANAN (RTL)
                duration: 800,      // Kecepatan balik halaman
                webgl: false,       // Matikan WebGL supaya ringan di HP
                backgroundColor: "#2c3e50"
            };
            
            // Perintah Jalankan Animasi
            $("#pembungkus-buku").flipBook(filePDF, pengaturan);
        });
    </script>

</body>
</html>
