<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flipbook halaman akhir</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="https://rawcdn.githack.com/blasten/turn.js/master/turn.min.js"></script>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; background: #1a1a1a; margin: 0; overflow: hidden; font-family: sans-serif;
        }
        #flipbook {
            width: 90vw; max-width: 450px; height: 75vh;
        }
        .page { width: 100%; height: 100%; background-color: white; }
        .page img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        .controls { width: 80%; max-width: 400px; margin-top: 20px; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #555; }
        .page-num { color: white; margin-top: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div id="flipbook">
    <div class="page"><img src="halaman1.jpg"></div>
    <div class="page"><img src="halaman2.jpg"></div>
    <div class="page"><img src="halaman3.jpg"></div>
    <div class="page"><img src="halaman4.jpg"></div>
    <div class="page"><img src="halaman5.jpg"></div>
</div>

<div class="controls">
    <input type="range" id="page-slider" min="1" max="5" value="5">
    <div class="page-num">Halaman: <span id="current-page">5</span> / 5</div>
</div>

<script type="text/javascript">
    $(window).ready(function() {
        var book = $("#flipbook");
        var slider = $("#page-slider");
        var label = $("#current-page");

        book.turn({
            display: 'single',
            pages: 5,          // Total halaman
            page: 5,           // INI KUNCINYA: Langsung buka halaman 5
            acceleration: true,
            gradients: true,
            elevation: 1000,
            when: {
                turned: function(event, page) {
                    slider.val(page);
                    label.text(page);
                }
            }
        });

        slider.on('input', function() {
            var val = $(this).val();
            book.turn('page', val);
            label.text(val);
        });

        var startX;
        book.on('touchstart', function(e) { startX = e.originalEvent.touches[0].pageX; });
        book.on('touchend', function(e) {
            var endX = e.originalEvent.changedTouches[0].pageX;
            if (startX - endX > 50) { book.turn('next'); }
            else if (startX - endX < -50) { book.turn('previous'); }
        });
    });

    $(window).resize(function() {
        $("#flipbook").turn("size", $("#flipbook").width(), $("#flipbook").height());
    });
</script>

</body>
</html>
