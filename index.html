<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitab Gaya Iqro</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <style>
        body { background-color: #000; margin: 0; padding: 0; overflow: hidden; }
        #flipbook { width: 100vw; height: 100vh; }
        .page { width: 100vw; height: 100vh; background-color: white; }
        .page img { width: 100%; height: 100%; object-fit: fill; }
    </style>
</head>
<body>

    <div id="flipbook">
        <div class="page"><img src="halaman1.jpg"></div>
        <div class="page"><img src="halaman2.jpg"></div>
        <div class="page"><img src="halaman3.jpg"></div>
        <div class="page"><img src="halaman4.jpg"></div>
        <div class="page"><img src="halaman5.jpg"></div>
    </div>

    <script type="text/javascript">
        $(window).ready(function() {
            var fb = $("#flipbook");

            fb.turn({
                display: 'single',
                direction: 'rtl', // Kunci Utama: Engsel pindah ke KANAN
                acceleration: true,
                gradients: true,
                elevation: 200,
                duration: 1000
            });

            // LOGIKA SWIPE IQRO
            var startX;
            $(document).on("touchstart", function(e) {
                startX = e.originalEvent.touches[0].pageX;
            });

            $(document).on("touchend", function(e) {
                var endX = e.originalEvent.changedTouches[0].pageX;
                var dist = startX - endX;

                // USAP KE KANAN (--->) = HALAMAN BERIKUTNYA
                if (dist < -50) { 
                    fb.turn("next"); 
                } 
                // USAP KE KIRI (<---) = BALIK HALAMAN
                else if (dist > 50) {
                    fb.turn("previous");
                }
            });
        });
    </script>
</body>
</html>
