<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flipbook github</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #222; 
            margin: 0; 
        }
        .container { width: 800px; height: 550px; }
        .page { background: white; }
        img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="container" id="flipbook">
    <div class="page"><img src="images/halaman1.jpg"></div>
    <div class="page"><img src="images/halaman2.jpg"></div>
    <div class="page"><img src="images/halaman3.jpg"></div>
    <div class="page"><img src="images/halaman4.jpg"></div>
    <div class="page"><img src="images/halaman5.jpg"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const pageflip = new St.PageFlip(document.getElementById('flipbook'), {
            width: 400,
            height: 550,
            size: "stretch",
            showCover: true
        });
        pageflip.loadFromHTML(document.querySelectorAll('.page'));
    });
</script>

</body>
</html>
