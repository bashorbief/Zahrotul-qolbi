<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitab Jurmiyah Flipbook Pro</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <style>
        body { 
            background-color: #1a1a1a; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        
        #viewport {
            width: 100vw;
            height: 90vh; /* Sisakan sedikit ruang agar tidak terlalu mepet */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #flipbook {
            width: 95%; /* Melebar hampir full layar */
            height: 100%;
        }

        .page {
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flipbook">
            <div class="page"><img src="halaman1.jpg"></div>
            <div class="page"><img src="halaman2.jpg"></div>
            <div class="page"><img src="halaman3.jpg"></div>
            <div class="page"><img src="halaman4.jpg"></div>
            <div class="page"><img src="halaman5.jpg"></div>
        </div>
    </div>

    <script type="text/javascript">
        $(window).ready(function() {
            var fb = $("#flipbook");

            fb.turn({
                width: fb.width(),
                height: fb.height(),
                autoCenter: true,
                display: 'double', // KEMBALI KE MODE DUA HALAMAN (ANIMASI KEREN)
                direction: 'rtl',
                acceleration: true,
                gradients: true,
                elevation: 100    // Efek lengkungan kertas lebih terasa
            });

            // FITUR TAMBAHAN: Geser (Swipe) di mana saja
            var startX;
            $(document).on("touchstart", function(e) {
                startX = e.originalEvent.touches[0].pageX;
            });

            $(document).on("touchend", function(e) {
                var endX = e.originalEvent.changedTouches[0].pageX;
                var distance = startX - endX;

                if (Math.abs(distance) > 70) { // Jika usapan lebih dari 70 pixel
                    if (distance > 0) {
                        fb.turn("next"); // Geser ke kiri
                    } else {
                        fb.turn("previous"); // Geser ke kanan
                    }
                }
            });
        });

        $(window).resize(function() {
            $("#flipbook").turn("size", $("#viewport").width(), $("#viewport").height());
        });
    </script>

</body>
</html>
