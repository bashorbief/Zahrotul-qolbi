<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Digital Asli</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/script/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #book-container {
            width: 100vw;
            height: 100vh;
        }

        #mybook {
            width: 100%;
            height: 100%;
        }

        .page {
            width: 100%;
            height: 100%;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: fill; /* Gambar dipaksa full layar */
            display: block;
        }
    </style>
</head>
<body>

<div id="book-container">
    <div id="mybook">
        <div class="page"><img src="halaman1.jpg"></div>
        <div class="page"><img src="halaman2.jpg"></div>
        <div class="page"><img src="halaman3.jpg"></div>
        <div class="page"><img src="halaman4.jpg"></div>
        <div class="page"><img src="halaman5.jpg"></div>
    </div>
</div>

<script type="text/javascript">
    $(document).ready(function() {
        var width = $(window).width();
        var height = $(window).height();

        $("#mybook").turn({
            width: width,
            height: height,
            display: 'single', // 1 halaman saja
            acceleration: true, // Mempercepat animasi agar luwes
            gradients: true,    // Menampilkan bayangan lipatan asli
            elevation: 100,      // Tinggi lipatan saat ditarik
            when: {
                turning: function(e, page) {
                    // Animasi perpindahan halaman
                }
            }
        });
    });

    // Menjaga agar tetap full layar saat HP diputar
    $(window).resize(function() {
        $("#mybook").turn("size", $(window).width(), $(window).height());
    });
</script>

</body>
</html>
