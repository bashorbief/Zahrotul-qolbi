<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitab Gaya Iqro</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <style>
        body { background-color: #000; margin: 0; padding: 0; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        /* Trik: Buat flipbook 2x lebar layar tapi geser agar hanya satu sisi yang kelihatan */
        #flipbook { 
            width: 200vw !important; 
            height: 100vh !important; 
            margin-left: 100vw; /* Geser engsel ke kanan layar */
        }
        
        .page { width: 100vw !important; height: 100vh !important; background-color: white; }
        .page img { width: 100%; height: 100%; object-fit: fill; }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flipbook">
            <div class="page"><img src="halaman1.jpg"></div>
            <div class="page"><img src="halaman2.jpg"></div>
            <div class="page"><img src="halaman3.jpg"></div>
            <div class="page"><img src="halaman4.jpg"></div>
            <div class="page"><img src="halaman5.jpg"></div>
        </div>
    </div>

    <script type="text/javascript">
        $(window).ready(function() {
            var fb = $("#flipbook");

            fb.turn({
                width: $(window).width() * 2,
                height: $(window).height(),
                display: 'double',
                acceleration: true,
                gradients: true,
                elevation: 300,    
                duration: 1200,
                // KUNCI UTAMA: Arah RTL agar engsel di kanan
                direction: 'rtl'
            });

            var startX;
            $(document).on("touchstart", function(e) {
                startX = e.originalEvent.touches[0].pageX;
            });

            $(document).on("touchend", function(e) {
                var endX = e.originalEvent.changedTouches[0].pageX;
                var dist = startX - endX;

                // USAP KE KANAN (--->) = MAJU (Angkat pojok kiri ke arah kanan)
                if (dist < -50) { 
                    fb.turn("next"); 
                } 
                // USAP KE KIRI (<---) = BALIK
                else if (dist > 50) {
                    fb.turn("previous");
                }
            });
        });
    </script>
</body>
</html>
