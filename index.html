<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>flipbook full</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="https://rawcdn.githack.com/blasten/turn.js/master/turn.min.js"></script>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: space-between; 
            height: 100vh; background: #000; margin: 0; overflow: hidden; 
        }
        /* Kontainer utama dibuat memenuhi layar */
        .book-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #flipbook {
            width: 100vw; 
            height: 80vh; /* Sisakan ruang untuk slider di bawah */
        }
        .page { width: 100%; height: 100%; background-color: #000; }
        .page img { width: 100%; height: 100%; object-fit: contain; }

        /* Style Slider agar lebih rapi di bawah */
        .controls { 
            width: 100%; padding: 15px 0; background: rgba(0,0,0,0.8);
            text-align: center; 
        }
        input[type=range] { width: 80%; cursor: pointer; accent-color: #fff; }
        .page-num { color: white; margin-top: 5px; font-size: 14px; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="book-wrapper">
    <div id="flipbook">
        <div class="page"><img src="halaman1.jpg"></div>
        <div class="page"><img src="halaman2.jpg"></div>
        <div class="page"><img src="halaman3.jpg"></div>
        <div class="page"><img src="halaman4.jpg"></div>
        <div class="page"><img src="halaman5.jpg"></div>
    </div>
</div>

<div class="controls">
    <input type="range" id="page-slider" min="1" max="5" value="1">
    <div class="page-num">Halaman: <span id="current-page">1</span> / 5</div>
</div>

<script type="text/javascript">
    $(window).ready(function() {
        var book = $("#flipbook");
        var slider = $("#page-slider");
        var label = $("#current-page");

        // Fungsi untuk mengatur ukuran buku secara dinamis
        function resizeBook() {
            var width = $(window).width();
            var height = $(window).height() * 0.8; // 80% dari tinggi layar
            book.turn("size", width, height);
        }

        book.turn({
            display: 'single',
            acceleration: true,
            gradients: true,
            elevation: 1000,
            when: {
                turned: function(event, page) {
                    slider.val(page);
                    label.text(page);
                }
            }
        });

        slider.on('input', function() {
            book.turn('page', $(this).val());
        });

        // Swipe support
        var startX;
        book.on('touchstart', function(e) { startX = e.originalEvent.touches[0].pageX; });
        book.on('touchend', function(e) {
            var endX = e.originalEvent.changedTouches[0].pageX;
            if (startX - endX > 50) { book.turn('next'); }
            else if (startX - endX < -50) { book.turn('previous'); }
        });

        $(window).resize(resizeBook);
        resizeBook(); // Jalankan saat pertama buka
    });
</script>

</body>
</html>
