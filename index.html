<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Kitab Al-Jurmiyah</title>
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/themify-icons.min.css" rel="stylesheet">
</head>
<body style="margin:0; background-color:#2c3e50;">

    <div id="df_book_custom" style="height:100vh;"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.45/js/dflip.min.js"></script>

    <script>
        var pdfUrl = "al-jurmiyah.pdf"; // Nama file kamu
        var options = {
            direction: 2,           // 2 artinya RTL (Mulai dari KANAN)
            duration: 800,          // Kecepatan balik halaman
            backgroundColor: "#2c3e50",
            height: "100%",
            enableAnnotation: false // Biar lebih ringan di HP
        };
        
        // Perintah menjalankan Flipbook
        $("#df_book_custom").flipBook(pdfUrl, options);
    </script>

</body>
</html>
