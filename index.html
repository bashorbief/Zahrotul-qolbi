<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbox 3D</title>
    <style>
        body { background-color: #f0f0f0; display: flex; justify-content: center; padding: 50px; font-family: sans-serif; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; }
        
        .flip-card { background-color: transparent; width: 200px; height: 300px; perspective: 1000px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
        
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 10px; overflow: hidden; }
        .flip-card-front img { width: 100%; height: 100%; object-fit: cover; }
        .flip-card-back { background-color: #2980b9; color: white; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Kartu 1 -->
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front"><img src="halaman1.jpg"></div>
                <div class="flip-card-back"><h3>Halaman 1</h3></div>
            </div>
        </div>
        <!-- Kartu 2 -->
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front"><img src="halaman2.jpg"></div>
                <div class="flip-card-back"><h3>Halaman 2</h3></div>
            </div>
        </div>
        <!-- Tambahkan sampai kartu 5 dengan src halaman3.jpg, dst -->
    </div>
</body>
</html>
