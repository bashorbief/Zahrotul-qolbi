<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flipbook lipat buku</title>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="https://rawcdn.githack.com/blasten/turn.js/master/turn.min.js"></script>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: #1a1a1a; margin: 0; overflow: hidden;
        }
        #flipbook {
            width: 90vw; max-width: 450px; height: 80vh;
        }
        .page { width: 100%; height: 100%; background-color: white; }
        .page img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    </style>
</head>
<body>

<div id="flipbook">
    <div class="page"><img src="halaman1.jpg"></div>
    <div class="page"><img src="halaman2.jpg"></div>
    <div class="page"><img src="halaman3.jpg"></div>
    <div class="page"><img src="halaman4.jpg"></div>
    <div class="page"><img src="halaman5.jpg"></div>
</div>

<script type="text/javascript">
    $(window).ready(function() {
        var book = $("#flipbook");

        book.turn({
            display: 'single',
            acceleration: true,
            gradients: true,
            elevation: 1000, // Membuat lipatan lebih tinggi/jelas
            when: {
                turning: function(event, page, pageObj) {
                    // Animasi sedang berjalan
                }
            }
        });

        // KODE KHUSUS: Agar bisa swipe di mana saja (tengah/seluruh layar)
        var startX;
        book.on('touchstart', function(e) {
            startX = e.originalEvent.touches[0].pageX;
        });

        book.on('touchend', function(e) {
            var endX = e.originalEvent.changedTouches[0].pageX;
            var diff = startX - endX;

            if (diff > 50) {
                book.turn('next'); // Swipe kiri ke kanan -> halaman selanjutnya
            } else if (diff < -50) {
                book.turn('previous'); // Swipe kanan ke kiri -> halaman sebelumnya
            }
        });
    });

    $(window).resize(function() {
        $("#flipbook").turn("size", $("#flipbook").width(), $("#flipbook").height());
    });
</script>

</body>
</html>
