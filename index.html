<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kitab Jurmiyah - Full Single Page</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

    <style>
        /* Menghilangkan semua margin agar benar-benar full */
        * { box-sizing: border-box; }
        body { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            width: 100vw;
            height: 100vh;
        }
        
        #viewport {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Memaksa ukuran buku sama dengan ukuran layar HP */
        #flipbook {
            width: 100vw !important;
            height: 100vh !important;
        }

        .page {
            background-color: white;
            width: 100vw !important;
            height: 100vh !important;
        }

        /* Gambar dibuat menutupi seluruh area halaman */
        .page img {
            width: 100%;
            height: 100%;
            object-fit: fill; /* Gunakan 'fill' agar benar-benar menutupi layar, atau 'contain' agar proporsional */
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flipbook">
            <div class="page"><img src="halaman1.jpg"></div>
            <div class="page"><img src="halaman2.jpg"></div>
            <div class="page"><img src="halaman3.jpg"></div>
            <div class="page"><img src="halaman4.jpg"></div>
            <div class="page"><img src="halaman5.jpg"></div>
        </div>
    </div>

    <script type="text/javascript">
        $(window).ready(function() {
            var fb = $("#flipbook");

            fb.turn({
                width: $(window).width(),
                height: $(window).height(),
                autoCenter: true,
                display: 'single', // PAKSA HANYA SATU HALAMAN
                direction: 'ltr',   // Arah usap sesuai permintaan (Kiri ke Kanan)
                acceleration: true,
                gradients: true,
                elevation: 100
            });

            // LOGIKA USAP: Kiri ke Kanan ---> Next
            var startX;
            $(document).on("touchstart", function(e) {
                startX = e.originalEvent.touches[0].pageX;
            });

            $(document).on("touchend", function(e) {
                var endX = e.originalEvent.changedTouches[0].pageX;
                var distance = startX - endX;

                if (Math.abs(distance) > 40) { 
                    if (distance < 0) {
                        fb.turn("next"); // Usap ke kanan untuk halaman baru
                    } else {
                        fb.turn("previous"); // Usap ke kiri untuk balik
                    }
                }
            });
        });

        // Pastikan ukuran tetap full jika orientasi layar berubah
        $(window).resize(function() {
            $("#flipbook").turn("size", $(window).width(), $(window).height());
        });
    </script>
</body>
</html>
