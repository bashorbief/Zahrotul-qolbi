<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitab Al-Jurmiyah Flipbook</title>
    
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.90/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.90/css/themify-icons.min.css" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #2c3e50; }
        #flipbook-manual { height: 100vh; }
        /* Gaya kertas kitab kuno */
        .halaman-kitab { 
            background: #f4ece1; 
            padding: 40px; 
            font-family: 'Serif'; 
            text-align: right; 
            direction: rtl;
            border: 1px solid #dcd3c1;
        }
    </style>
</head>
<body>

    <div id="flipbook-manual"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.90/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            // Kita bikin halamannya manual di sini (Tulis teks kitabnya di sini)
            var sumberHalaman = [
                "<div class='halaman-kitab'><h1>بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ</h1><p>Al-Kalamu huwa al-lafzhu al-murakkabu al-mufidu bil-wadhi'i...</p></div>",
                "<div class='halaman-kitab'><h2>Bab Al-I'rab</h2><p>Al-I'rabu huwa taghyiru awakhiril kalimi...</p></div>",
                "<div class='halaman-kitab'><h2>Bab Al-Af'al</h2><p>Al-Af'alu tsalatsatun: madhin, wa mudhari'un, wa amrun...</p></div>"
            ];

            var pengaturan = {
                direction: 2, // Kanan ke kiri (RTL)
                duration: 800,
                webgl: false
            };

            // Jalankan flipbook menggunakan TEXT/HTML bukan PDF
            $("#flipbook-manual").flipBook(sumberHalaman, pengaturan);
        });
    </script>

</body>
</html>
