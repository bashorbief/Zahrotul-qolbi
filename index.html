<!DOCTYPE html>
<html>
<head>
    <title>Flipbook PDF</title>
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@1.0.45/css/themify-icons.min.css" rel="stylesheet">
</head>
<body style="background-color: #2c3e50; margin: 0;">

    <div id="tempat-buku" style="height: 100vh;"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.45/js/dflip.min.js"></script>

    <script>
        // Memanggil file buku.pdf yang kamu upload tadi
        var pdf_saya = "al-jurmiyah.pdf"; 
        var pengaturan = {
            direction: 2, // 2 artinya mulai dari KANAN (RTL)
            duration: 800 
        };
        $("#tempat-buku").flipBook(pdf_saya, pengaturan);
    </script>

</body>
</html>
